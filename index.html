<html>
    <head>
        <title>FNAF 6 REFERENCE 100%</title>
        
        <style>
            BODY {
                background: #000000;
                font-family: 'Courier New', Courier, monospace;
            }
            
            .leftbutton {
                background-image: url('left-button.png');
                background-color: #00000000;
                position: absolute;
                background-size: cover;
                background-repeat: no-repeat;
                background-position: center; /* Centers the image so cropping occurs equally on all sides */
                image-rendering: pixelated;
                width: 100px;
                height: 100px;
                border: none;
                top: 50%;
                left: 15%;
                transform: translate(-50%, -50%);
            }
            .rightbutton {
                background-image: url('right-button.png');
                background-color: #00000000;
                position: absolute;
                background-size: cover;
                background-repeat: no-repeat;
                background-position: center; /* Centers the image so cropping occurs equally on all sides */
                image-rendering: pixelated;
                width: 100px;
                height: 100px;
                border: none;
                top: 50%;
                left: 85%;
                transform: translate(-50%, -50%);
            }
            .button {
                background-color: #00000000;
                position: absolute;
                background-repeat: no-repeat;
                background-position: center; /* Centers the image so cropping occurs equally on all sides */
                image-rendering: pixelated;
                width: 70%;
                height: 85%;
                border: none;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                transition: all 0.25s ease;
            }
            .video {
                background-color: #00000000;
                position: absolute;
                background-repeat: no-repeat;
                background-position: center; /* Centers the image so cropping occurs equally on all sides */
                image-rendering: pixelated;
                width: 100%;
                height: 100%;
                border: none;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                transition: all 0.25s ease;
            }
        </style>
    </head>
    <body>
        <video src="videos/misha idle.mp4" muted autoplay loop class="video" style="opacity: 0;" id="mishaidleCutscene">
        </video>

        <video preload src="videos/misha open.mp4" style="display: none;" class="video" id="firstOpenCutscene">
        </video>
        
        <video preload src="videos/open.mp4" class="video" style="display: none;" id="openCutscene">
        </video>
        
        <video preload src="videos/close.mp4" class="video" style="display: none;" id="closeCutscene">
        </video>
        
        <video preload src="videos/flip page start.mp4" class="video" style="display: none;" id="flipstartpageCutscene">
        </video>
        
        <video preload src="videos/flip page middle.mp4" class="video" style="display: none;" id="flipmiddlepageCutscene">
        </video>
        
        <video preload src="videos/flip page end.mp4" class="video" style="display: none;" id="flipendpageCutscene">
        </video>

        <video preload src="videos/back flip page start.mp4" class="video" style="display: none;" id="back_flipstartpageCutscene">
        </video>
        
        <video preload src="videos/back flip page middle.mp4" class="video" style="display: none;" id="back_flipmiddlepageCutscene">
        </video>
        
        <video preload src="videos/back flip page end.mp4" class="video" style="display: none;" id="back_flipendpageCutscene">
        </video>
        
        <video preload poster="pages/1.png" class="video" style="display: none;" id="page_image"></video>

        <audio id="ambience_sfx" src="sfx/ambience.mp3" loop="loop"></audio>
        
        <button class="button" id="button" onclick="openCutscene()">
        </button>

        <button class="leftbutton" id="leftbutton" style="display: none;" onclick="flipPage(false)">
        </button>
        
        <button class="rightbutton" id="rightbutton" style="display: none;" onclick="flipPage(true)">
        </button>
        
        <script src="data.js"></script>
        <script src="script.js"></script>
    </body>
</html>
